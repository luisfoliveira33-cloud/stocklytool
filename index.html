
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STOCKLY</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebaseConfig.js"></script>

</head>

<body>

<div id="loginPage">
<div class="loginCard">
<h1>STOCKLY</h1>
<p>Controle de Estoque</p>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
</div>
</div>


<div id="app" class="hidden">

<header>
<h1>STOCKLY</h1>
<nav id="menuFG" class="hidden">
<button onclick="openTab('producao')">Produção</button>
<button onclick="openTab('venda')">Venda</button>
<button onclick="openTab('estoque')">Estoque</button>
</nav>
</header>


<section id="dashboard" class="hidden page">
<h2>Dashboard do Estoque</h2>
<div class="card">
<canvas id="grafico"></canvas>
</div>
</section>


<section id="producao" class="hidden page">
<h2>Registrar Produção</h2>

<div class="card form">

<select id="prodProd">
<option>Doce de Banana Tradicional</option>
<option>Banana Diet</option>
<option>Doce de Banana com Canela</option>
</select>

<input id="qtdProd" type="number" placeholder="Quantidade">

<button onclick="registrarProducao()">Registrar</button>

</div>
</section>


<section id="venda" class="hidden page">
<h2>Registrar Venda</h2>

<div class="card form">

<select id="prodVenda">
<option>Doce de Banana Tradicional</option>
<option>Banana Diet</option>
<option>Doce de Banana com Canela</option>
</select>

<input id="qtdVenda" type="number" placeholder="Quantidade">

<button onclick="registrarVenda()">Registrar</button>

</div>

</section>


<section id="estoque" class="hidden page">

<h2>Estoque Atual</h2>

<div class="card">

<table>
<thead>
<tr>
<th>Produto</th>
<th>Quantidade</th>
</tr>
</thead>
<tbody id="estoqueTabela"></tbody>
</table>

</div>

</section>

</div>

<script src="app.js"></script>

</body>
</html>
